default_install_hook_types: [pre-commit, pre-push]

repos:
    - repo: https://github.com/trailofbits/pip-audit
      rev: v2.10.0
      hooks:
        - id: pip-audit
          args: ["-r", "requirements.txt", "--strict"]

    - repo: local
      hooks:
        - id: pytest
          name: pytest (full suite)
          entry: pytest --tb=short -q
          language: system
          pass_filenames: false
          stages: [pre-push]