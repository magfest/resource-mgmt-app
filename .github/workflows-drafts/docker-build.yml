# =============================================================================
# DRAFT - Not active. Move to .github/workflows/ to enable.
#
# Docker Build & Push to GitHub Container Registry (GHCR)
# Builds on push to master and tags with branch name.
# Designed to run alongside Uber on the same K8s cluster.
#
# Prerequisites before enabling:
#   1. Ensure GHCR packages are enabled for the magfest org
#   2. Verify the Dockerfile builds locally: docker build -t budget-app .
#   3. Move this file to .github/workflows/docker-build.yml
# =============================================================================
name: Build Docker Image

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          context: "."
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
