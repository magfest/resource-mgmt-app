{# Supply order line form fields partial - item picker, quantity, needed by #}
{# Expected context: supply_categories, supply_items (grouped by category), line (optional for edit) #}

<div class="form-group">
  <label for="item_id">Supply Item *</label>
  <select name="item_id" id="item_id" required>
    <option value="">Select supply item...</option>
    {% for category in supply_categories %}
      <optgroup label="{{ category.name }}">
        {% for item in category.items if item.is_active %}
          <option value="{{ item.id }}"
                  data-unit="{{ item.unit }}"
                  data-cost="{{ item.unit_cost_cents or 0 }}"
                  {% if line and line.supply_detail and line.supply_detail.item_id == item.id %}selected{% endif %}>
            {{ item.item_name }}
            {% if item.unit_cost_cents %} (${{ '{:.2f}'.format(item.unit_cost_cents / 100) }}/{{ item.unit }}){% endif %}
          </option>
        {% endfor %}
      </optgroup>
    {% endfor %}
  </select>
</div>

<div class="form-row">
  <div class="form-group">
    <label for="quantity_requested">Quantity *</label>
    <input type="number" name="quantity_requested" id="quantity_requested" min="1" step="1"
           value="{{ line.supply_detail.quantity_requested if line and line.supply_detail else '1' }}" required>
  </div>

  <div class="form-group">
    <label for="needed_by_date">Needed By</label>
    <input type="date" name="needed_by_date" id="needed_by_date"
           value="{{ line.supply_detail.needed_by_date.strftime('%Y-%m-%d') if line and line.supply_detail and line.supply_detail.needed_by_date else '' }}">
  </div>
</div>

<div class="form-group">
  <label for="delivery_location">Delivery Location</label>
  <input type="text" name="delivery_location" id="delivery_location" maxlength="256"
         value="{{ line.supply_detail.delivery_location if line and line.supply_detail else '' }}">
</div>

<div class="form-group">
  <label for="requester_notes">Notes</label>
  <textarea name="requester_notes" id="requester_notes" rows="3">{{ line.supply_detail.requester_notes if line and line.supply_detail else '' }}</textarea>
</div>
