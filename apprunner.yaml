# AWS App Runner configuration
# https://docs.aws.amazon.com/apprunner/latest/dg/config-file.html

version: 1.0

runtime: python312

build:
  commands:
    build:
      - pip install -r requirements.txt

run:
  command: gunicorn --bind 0.0.0.0:8080 --workers 2 --threads 4 "app:create_app()"
  network:
    port: 8080
    env: APP_PORT
  env:
    - name: APP_ENV
      value: "production"
    - name: BEHIND_PROXY
      value: "true"

  # These should be set in AppRunner console (not in this file):
  # - AWS_SECRETS_ARN
  # - AWS_REGION
  # Or if not using Secrets Manager:
  # - SECRET_KEY
  # - DATABASE_URL
  # - KEYCLOAK_URL, KEYCLOAK_CLIENT_ID, KEYCLOAK_CLIENT_SECRET
